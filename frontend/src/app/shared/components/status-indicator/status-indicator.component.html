 * ---------
 * - Status indicator layout
 * - Status label
 * - Status icon
 */

<div class="status">
  <span
    class="status-dot"
    [class.healthy]="status === 'healthy'"
    [class.offline]="status === 'offline'"
  >
  </span>

  <span class="status-text">
    {{ status }}
  </span>
</div>

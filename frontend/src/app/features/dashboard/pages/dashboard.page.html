<ion-header>
  <ion-toolbar>
    <ion-title>Cortex Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-content">
  <ion-grid>
    <ion-row>
      <ion-col size="12" sizeMd="4">
        <ion-card>
          <ion-card-header>
            <ion-card-title> Documents </ion-card-title>
          </ion-card-header>

          <ion-card-content> 0 Indexed </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" sizeMd="4">
        <ion-card>
          <ion-card-header>
            <ion-card-title> Chunks </ion-card-title>
          </ion-card-header>

          <ion-card-content> 0 Chunks </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" sizeMd="4">
        <ion-card>
          <ion-card-header>
            <ion-card-title> AI Status </ion-card-title>
          </ion-card-header>

          <ion-card-content> Ready </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

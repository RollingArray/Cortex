version: 1

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: DEBUG

  file:
    class: logging.handlers.RotatingFileHandler
    filename: logs/cortex.log
    maxBytes: 10485760
    backupCount: 5
    formatter: standard
    level: DEBUG

  error_file:
    class: logging.handlers.RotatingFileHandler
    filename: logs/cortex-error.log
    maxBytes: 10485760
    backupCount: 5
    formatter: standard
    level: ERROR

root:
  level: DEBUG
  handlers:
    - console
    - file
    - error_file